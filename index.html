<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Projector</title>
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" aria-live="polite">
      <div class="stage__overlay" id="overlay">
        <div class="overlay__content">
          <h1>Digital Projector</h1>
          <p>Project video content to any wall with a clean, distraction-free display.</p>
          <div class="overlay__controls">
            <label class="button" for="videoFile">Select video</label>
            <input type="file" id="videoFile" accept="video/*" />
            <button class="button button--ghost" id="sampleButton" type="button">
              Load sample clip
            </button>
          </div>
          <div class="overlay__tips">
            <p><strong>Tips:</strong> press <kbd>F</kbd> for fullscreen, <kbd>Space</kbd> to play/pause, <kbd>M</kbd> to mute.</p>
          </div>
        </div>
      </div>
      <video
        id="video"
        class="stage__video"
        playsinline
        muted
        preload="metadata"
        aria-label="Video projection surface"
      ></video>
      <div class="controls">
        <button class="controls__button" id="playButton" type="button">Play</button>
        <button class="controls__button" id="muteButton" type="button">Mute</button>
        <button class="controls__button" id="fullscreenButton" type="button">Fullscreen</button>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
